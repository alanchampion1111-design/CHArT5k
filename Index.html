<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 4.5rem); }
  </style>
</head>
<body class="bg-amber-50 text-slate-800 font-sans min-h-screen flex flex-col select-none">

  <header class="bg-amber-400 shadow-md p-4 sticky top-0 z-50 flex justify-between items-center">
    <div class="flex items-center space-x-3">
      <button onclick="toggleMenu(true)" class="p-1 rounded-full active:bg-amber-500 transition">
        <i class="material-icons text-2xl text-slate-900">menu</i>
      </button>
      <h1 class="text-xl font-bold tracking-wide text-slate-990">CHArT5k</h1>
    </div>
    <div id="status-badge" class="text-xs bg-amber-600 text-white font-semibold px-2 py-1 rounded">Syncing...</div>
  </header>

  <div id="sidebar-overlay" onclick="toggleMenu(false)" class="fixed inset-0 bg-black/40 z-50 hidden opacity-0 transition-opacity duration-300"></div>
  <div id="sidebar" class="fixed top-0 bottom-0 left-0 w-72 bg-white z-50 shadow-2xl transform -translate-x-full transition-transform duration-300 flex flex-col">
    <div class="p-5 bg-amber-400 font-bold text-lg text-slate-950 flex justify-between items-center">
      <span>Menu Options</span>
      <button onclick="toggleMenu(false)"><i class="material-icons">close</i></button>
    </div>

    <nav class="flex-1 p-3 space-y-1">
      <!-- 'User Profile Setting'; initial default shown;
          hidden after once-only user profile set -->
      <button id="menu-setup" onclick="showScreen('setup'); toggleMenu(false);" class="w-full flex items-center space-x-4 p-3 rounded-lg hover:bg-slate-100 text-left text-slate-700 font-medium">
        <i class="material-icons text-amber-500">person_add_alt</i> <span>User Profile Setting</span>
      </button>
      <button id="menu-group-request" onclick="triggerNewGroupRequest(); toggleMenu(false);" class="w-full flex items-center space-x-4 p-3 rounded-lg hover:bg-slate-100 text-left text-slate-700 font-medium">
        <i class="material-icons text-amber-600">group_add</i> <span>New Group request...</span>
      </button>
      <hr class="my-2 border-slate-200">
      <button onclick="showScreen('about'); toggleMenu(false);" class="w-full flex items-center space-x-4 p-3 rounded-lg hover:bg-slate-100 text-left text-slate-700 font-medium">
        <i class="material-icons text-slate-500">info</i> <span>About CHArT5k</span>
      </button>
    </nav>
    <div class="p-4 border-t border-slate-100 text-xs text-slate-400 text-center">CHArT5k Core Engine v1.2</div>
  </div>

  <main class="flex-1 p-4 safe-bottom max-w-md mx-auto w-full">
    
    <!-- My Trends screen: unreachable until after user profile fully set (Group + Runner Id) -->
    <section id="screen-trends" class="app-screen space-y-4 hidden">
      <h2 id='trends-runner-title' class="text-lg font-bold text-slate-700">My Trends</h2>
      <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 space-y-4">
        <button id="btn-trends-overall" onclick="openLink('trends.overallUrl')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl flex items-center justify-between border border-slate-100 active:bg-slate-100 transition">
          <span class="font-medium text-sm text-slate-700">Progress Chart</span><i class="material-icons text-amber-500">trending_up</i>
        </button>
        <!-- Expect recent (past year?) to be hidden if only one chart found for this runner -->
        <button id="btn-trends-recent" onclick="openLink('trends.recentUrl')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl flex items-center justify-between border border-slate-100 active:bg-slate-100 transition">
          <span class="font-medium text-sm text-slate-700">Current Trend</span><i class="material-icons text-amber-500">trending_up</i>
        </button>
        <button id="btn-trends-results" onclick="openLink('trends.resultsUrl')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl flex items-center justify-between border border-slate-100 active:bg-slate-100 transition">
          <span class="font-medium text-sm text-slate-700">Recent Results</span><i class="material-icons text-amber-500">table_chart</i>
        </button>
      </div>
      <!-- 'Request pending' appears after user sends to owner, then fully disappears after actioned
          - applies universally across all 3 screens -->
      <div class="mt-6 pt-4 border-t border-slate-200 text-center">
        <button class="access-status-drawer inline-flex items-center space-x-2 text-sm text-slate-500 hover:text-amber-600 font-medium p-2 rounded transition" onclick="triggerAccessRequest();">
          <i class="material-icons text-base align-middle mr-1">vpn_key</i>
          <span class="access-text">Allow me access...</span>
        </button>
      </div>
    </section>

    <!-- <Group> Charts screen: unreachable until after user profile set (Group SS at least) -->
    <section id="screen-charts" class="app-screen space-y-4 hidden">
      <h2 id='charts-group-title' class="text-lg font-bold text-slate-700">Comparative Charts</h2>
      <div id="charts-wrapper" class="space-y-4"></div>
      <!-- 'Request pending' appears after user sends to owner, then fully disappears after actioned
          - applies universally across all 3 screens -->
      <div class="mt-6 pt-4 border-t border-slate-200 text-center">
        <button class="access-status-drawer inline-flex items-center space-x-2 text-sm text-slate-500 hover:text-amber-600 font-medium p-2 rounded transition" onclick="triggerAccessRequest();">
          <i class="material-icons text-base align-middle mr-1">vpn_key</i>
          <span class="access-text">Allow me access...</span>
        </button>
      </div>
    </section>

    <!-- 'Members Rankings' screen: unreachable until after user profile set (Group SS at least) -->
    <section id="screen-rankings" class="app-screen space-y-4 hidden">
      <h2 class="text-lg font-bold text-slate-700">Members Rankings</h2>
      <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-2">
        <button onclick="openLink('rankings.latestUrl')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl flex items-center justify-between border border-slate-100 active:bg-slate-100 transition">
          <span class="font-medium text-sm text-slate-700">Latest  Results</span><i class="material-icons text-amber-500">table_chart</i>
        </button>
        <button onclick="openLink('rankings.currentUrl')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl flex items-center justify-between border border-slate-100 active:bg-slate-100 transition">
          <span class="font-medium text-sm text-slate-700">Current Ranking</span><i class="material-icons text-amber-500">emoji_events</i>
        </button>
        <button onclick="openLink('rankings.bestEverUrl')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl flex items-center justify-between border border-slate-100 active:bg-slate-100 transition">
          <span class="font-medium text-sm text-slate-700">Best-Ever Ranking</span><i class="material-icons text-amber-500">stars</i>
        </button>
        <button onclick="openLink('rankings.challengeUrl')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl flex items-center justify-between border border-slate-100 active:bg-slate-100 transition">
          <span class="font-medium text-sm text-slate-700">Latest Challenge</span><i class="material-icons text-amber-500">table_chart</i>
        </button>
      </div>
      <!-- 'Request pending' appears after user sends to owner, then fully disappears after actioned
          - applies universally across all 3 screens -->
      <div class="mt-6 pt-4 border-t border-slate-200 text-center">
        <button class="access-status-drawer inline-flex items-center space-x-2 text-sm text-slate-500 hover:text-amber-600 font-medium p-2 rounded transition" onclick="triggerAccessRequest();">
          <i class="material-icons text-base align-middle mr-1">vpn_key</i>
          <span class="access-text">Allow me access...</span>
        </button>
      </div>
    </section>

    <!-- 'User Profile Setting' screen: default, unreachable AFTER user profile set (Group SS at least) -->
    <section id="screen-setup" class="app-screen space-y-4 hidden">
      <h2 class="text-lg font-bold text-slate-700">User Profile Setting</h2>
      <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 space-y-4">
        <div class="flex border-b border-slate-100 pb-2 mb-2">
          <button id="toggle-existing" onclick="toggleSetupMode(true)" class="flex-1 text-center font-bold text-xs py-2 bg-amber-400 text-slate-900 rounded-lg">Existing member</button>
          <button id="toggle-custom" onclick="toggleSetupMode(false)" class="flex-1 text-center font-bold text-xs py-2 text-slate-400 rounded-lg">New member...</button>
        </div>
        <div class="space-y-2">
          <div id="info-user-setup" class="text-xs text-slate-500 bg-slate-50 p-3 rounded-xl border border-slate-200 leading-relaxed italic"></div>
          <div>
            <label class="block text-xs font-bold text-slate-500 tracking-wider mb-1">Select Group</label>
            <select id="setup-group" onchange="onGroupSelectionChange()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-amber-400 text-sm"></select>
          </div>
        </div>
        <div id="wrapper-existing-form" class="space-y-4 pt-2">
          <div class="space-y-2">
            <div id="info-runner-id-note" class="text-xs text-slate-500 bg-slate-50 p-3 rounded-xl border border-slate-200 leading-relaxed italic"></div>
            <div>
              <label class="block text-xs font-bold text-slate-500 tracking-wider mb-1">Select Runner ID</label>
              <select id="setup-id" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-amber-400 text-sm"></select>
            </div>
          </div>
        </div>
        <div id="wrapper-custom-form" class="space-y-4 hidden pt-2">
          <div id="info-member-request" class="text-xs text-blue-700 bg-blue-50/50 p-3 rounded-xl border border-blue-100 leading-relaxed italic"></div>
        </div>
        <div class="flex space-x-3 pt-2">
          <button id="btn-cancel-setup" onclick="cancelSetup()" class="flex-1 bg-slate-100 hover:bg-slate-200 py-3 rounded-xl font-semibold text-slate-600 transition">Cancel</button>
          <button onclick="saveSetup()" class="flex-1 bg-amber-400 hover:bg-amber-500 py-3 rounded-xl font-bold text-slate-900 transition shadow">Apply Setting (on this device)</button>
        </div>
      </div>
    </section>

    <!-- Presented from menu option, 'About CHarT5k' -->
    <section id="screen-about" class="app-screen space-y-4 hidden">
      <h2 class="text-lg font-bold text-slate-700">About CHArT5k</h2>
      <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 space-y-3">
        <h3 id="about-short" class="text-slate-800 font-bold text-sm whitespace-pre-wrap"></h3>
        <p id="about-full" class="text-slate-600 text-xs leading-relaxed whitespace-pre-wrap"></p>
      </div>
    </section>

  </main>

  <!-- Footer hides all three button until AFTER user profile set;
      if Runner Id not set, left button remains hidden -->
  <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-2xl z-40">
    <div class="max-w-md mx-auto flex justify-around items-center h-16">
      <button id="nav-trends" onclick="showScreen('trends')"
          class="flex flex-col items-center justify-center w-full h-full text-amber-500 font-bold transition hidden">
        <i class="material-icons">analytics</i>
        <div class="flex flex-col items-center leading-none mt-0.5">
          <span id='nav-trends-runner' class="text-[10px]">My</span>
          <span class="text-[10px] mt-0.5">Trends</span>
        </div>
      </button>
      <button id="nav-charts" onclick="showScreen('charts')"
          class="flex flex-col items-center justify-center w-full h-full text-slate-400 font-semibold transition hidden">
        <i class="material-icons">insert_chart</i>
        <div class="flex flex-col items-center leading-none mt-0.5">
          <span id="nav-charts-prefix" class="text-[10px] font-medium tracking-wide text-slate-400 block max-w-[65px] truncate text-center leading-none mb-0.5"></span>
          <span class="text-[10px] mt-0.5">Charts</span>
        </div>
      </button>
      <button id="nav-rankings" onclick="showScreen('rankings')"
          class="flex flex-col items-center justify-center w-full h-full text-slate-400 font-semibold transition hidden">
        <i class="material-icons">format_list_numbered</i>
        <div class="flex flex-col items-center leading-none mt-0.5">
          <span class="text-[10px]">Members</span>
          <span class="text-[10px] mt-0.5">Rankings</span>
        </div>
      </button>
    </div>
  </footer>

  <script>
    // MUST: globals declared here for GAS (not within include file!) 
    //        and so need to held in the shared window. storage
    let devId = null;           // unique per device, generated in the DOM
    let isExistingMode = true;
    let cachedProfile = null;
    let activeDirectory = [];
    let runtimeRouting = null;
    
    const defaultSCREEN = 'charts';
    const openTAB = 'GroupSSTab';   // used by Group Rankings tables (via openLink)
    const fastTAB = 'SharedSSTab';  // used by dynamic Trends & Charts (window.open)
    const mailTAB = 'RequestTab';   // for mailto: new member/group or allow access

/*

[ FRONT-END / Index.html ]                                  [ BACK-END / AppCode.gs ]
==========================                                  =========================
DOMContentLoaded
        │
        ▼
1. resolveDeviceFingerprint() 
        │
        ▼
2. initializeApplicationData() [FE]
        │
  (Calls backend via script runner)
        │
        └──────────── google.script.run ────────────────┐
                                                      ▼
                                                3. doGet() ──► Renders base HTML
                                                      │
                                                      ▼
                                                4. initializeApplicationData(devId) [BE]
                                                      ├── 1A: Scan Device Registry
                                                      ├── 1B: Verify cachedProfile
                                                      ├── 1C: Pull Active Directory matrix
                                                      └── 1D: Calc Access State matrix
                                                      │
        ┌──────────── Async Response Return ────────────┘
        ▼
5. Evaluate UI Pivot Point
        │
        ├───[ IF Profile Empty / Incomplete ]──► 6A. showScreen('setup')
        │                                               │
        │                                               ▼
        │                                            toggleSetupMode(useExisting)
        │                                               ├── Existing -> getRunnerIdsForGroup()
        │                                               └── New -> triggerNewGroupRequest()
        │
        └───[ IF Profile Set & Verified ]──────► 6B. fetchLiveRoutingPayload()

                                                        │
                                                        ▼
                                                    getDashboardRouting [BE]
                                                        │ (Returns target URLs)
                                                        ▼
                                                    updateNavigationContext()
                                                        ├── Unhide & highlight footer tabs
                                                        ▼
                                                    syncAccessInterfaceState()
                                                        ├── Needed -> enable Access lock
                                                        ├── Requested -> disable Access lock
                                                        └── Granted -> discard Access lock

The presence of initializeApplicationData on both sides represents a Client-Server Handshake Pattern. They share a name because they represent the same phase of the application life cycle, but their inner responsibilities are entirely complementary:

Attribute   Front-End                           Back-End
            initializeApplicationData()         initializeApplicationData(devId)

Location    Browser JavaScript context          Google Servers
            (<script> block)                    (AppCode.gs)

Role  	    The Conductor:                      The Source of Truth:
            Sets up local UI,                   Validates the devId, 
            kicks off network requests,         queries the spreadsheets, 
            handles loading screens,            builds the payload object, 
            and waits for answers.              and assesses security.

Data Scope  Interacts with localStorage         Interacts directly with 
            and toggles Tailwind utility        Google Sheets API 
            styles (like .hidden).              and reads user registries.

*/
  </script>
  <?!= include('JavaScript'); ?>

</body>
</html>
