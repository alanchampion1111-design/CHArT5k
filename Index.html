<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 4.5rem); }
  </style>
</head>
<body class="bg-amber-50 text-slate-800 font-sans min-h-screen flex flex-col select-none">

  <header class="bg-amber-400 shadow-md p-4 sticky top-0 z-50 flex justify-between items-center">
    <div class="flex items-center space-x-3">
      <button onclick="toggleMenu(true)" class="p-1 rounded-full active:bg-amber-500 transition">
        <i class="material-icons text-2xl text-slate-900">menu</i>
      </button>
      <h1 class="text-xl font-bold tracking-wide text-slate-990">CHArT5k</h1>
    </div>
    <div id="status-badge" class="text-xs bg-amber-600 text-white font-semibold px-2 py-1 rounded">Syncing...</div>
  </header>

  <div id="sidebar-overlay" onclick="toggleMenu(false)" class="fixed inset-0 bg-black/40 z-50 hidden opacity-0 transition-opacity duration-300"></div>
  <div id="sidebar" class="fixed top-0 bottom-0 left-0 w-72 bg-white z-50 shadow-2xl transform -translate-x-full transition-transform duration-300 flex flex-col">
    <div class="p-5 bg-amber-400 font-bold text-lg text-slate-950 flex justify-between items-center">
      <span>Menu Options</span>
      <button onclick="toggleMenu(false)"><i class="material-icons">close</i></button>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <button id="menu-setup" onclick="showScreen('setup'); toggleMenu(false);" class="w-full flex items-center space-x-4 p-3 rounded-lg hover:bg-slate-100 text-left text-slate-700 font-medium">
        <i class="material-icons text-amber-500">person_add_alt</i> <span>User Profile Setting</span>
      </button>
      <hr class="my-2 border-slate-200">
      <button onclick="showScreen('about'); toggleMenu(false);" class="w-full flex items-center space-x-4 p-3 rounded-lg hover:bg-slate-100 text-left text-slate-700 font-medium">
        <i class="material-icons text-slate-500">info</i> <span>About CHArT5k</span>
      </button>
    </nav>
    <div class="p-4 border-t border-slate-100 text-xs text-slate-400 text-center">CHArT5k Core Engine v1.2</div>
  </div>

  <main class="flex-1 p-4 safe-bottom max-w-md mx-auto w-full">
    
    <section id="screen-trends" class="app-screen space-y-4">
      <h2 class="text-lg font-bold text-slate-700">My Runner Performance</h2>
      <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 space-y-4">
        <p class="text-sm text-slate-600">Access your historical timeline performance metric chart generated from your club profile context coordinates.</p>
        <button id="btn-trends" onclick="openLink('trendsUrl')" class="w-full bg-amber-400 hover:bg-amber-500 active:scale-[0.98] transition font-bold py-3 px-4 rounded-xl text-slate-900 shadow flex items-center justify-center space-x-2">
          <i class="material-icons">trending_up</i> <span>Open My Trends Chart</span>
        </button>
      </div>
    </section>

    <section id="screen-charts" class="app-screen space-y-4 hidden">
      <h2 class="text-lg font-bold text-slate-700">Group Analytics Sheets</h2>
      <div id="charts-wrapper" class="space-y-4"></div>
    </section>

    <section id="screen-rankings" class="app-screen space-y-4 hidden">
      <h2 class="text-lg font-bold text-slate-700">Club Standings & Leaderboards</h2>
      <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-2">
        <button onclick="openLink('rankings.latestUrl')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl flex items-center justify-between border border-slate-100 active:bg-slate-100 transition">
          <span class="font-medium text-sm text-slate-700">Latest Event Results Table</span><i class="material-icons text-amber-500">table_chart</i>
        </button>
        <button onclick="openLink('rankings.currentUrl')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl flex items-center justify-between border border-slate-100 active:bg-slate-100 transition">
          <span class="font-medium text-sm text-slate-700">Current Club Rankings (A8)</span><i class="material-icons text-amber-500">emoji_events</i>
        </button>
        <button onclick="openLink('rankings.bestEverUrl')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl flex items-center justify-between border border-slate-100 active:bg-slate-100 transition">
          <span class="font-medium text-sm text-slate-700">Best-Ever Club Records (A111)</span><i class="material-icons text-amber-500">stars</i>
        </button>
      </div>
    </section>

    <section id="screen-setup" class="app-screen space-y-4 hidden">
      <h2 class="text-lg font-bold text-slate-700">User Profile Setting</h2>
      <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 space-y-4">
        
        <div class="flex border-b border-slate-100 pb-2 mb-2">
          <button id="toggle-existing" onclick="toggleSetupMode(true)" class="flex-1 text-center font-bold text-xs py-2 bg-amber-400 text-slate-900 rounded-lg">Existing member</button>
          <button id="toggle-custom" onclick="toggleSetupMode(false)" class="flex-1 text-center font-bold text-xs py-2 text-slate-400 rounded-lg">New member</button>
        </div>

        <div class="space-y-2">
          <div id="info-user-setup" class="text-xs text-slate-500 bg-slate-50 p-3 rounded-xl border border-slate-200 leading-relaxed italic"></div>
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Select Group</label>
            <select id="setup-group" onchange="onGroupSelectionChange()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-amber-400 text-sm"></select>
          </div>
        </div>

        <div id="wrapper-existing-form" class="space-y-4 pt-2">
          <div class="space-y-2">
            <div id="info-runner-id-note" class="text-xs text-slate-500 bg-slate-50 p-3 rounded-xl border border-slate-200 leading-relaxed italic"></div>
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Select My Runner ID</label>
              <select id="setup-id" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-amber-400 text-sm"></select>
            </div>
          </div>
        </div>

        <div id="wrapper-custom-form" class="space-y-4 hidden pt-2">
          <div id="info-member-request" class="text-xs text-blue-700 bg-blue-50/50 p-3 rounded-xl border border-blue-100 leading-relaxed italic"></div>
        </div>

        <div class="flex space-x-3 pt-2">
          <button id="btn-cancel-setup" onclick="cancelSetup()" class="flex-1 bg-slate-100 hover:bg-slate-200 py-3 rounded-xl font-semibold text-slate-600 transition">Cancel</button>
          <button onclick="saveSetup()" class="flex-1 bg-amber-400 hover:bg-amber-500 py-3 rounded-xl font-bold text-slate-900 transition shadow">Apply Setting (on this device)</button>
        </div>
      </div>
    </section>

    <section id="screen-about" class="app-screen space-y-4 hidden">
      <h2 class="text-lg font-bold text-slate-700">About CHArT5k</h2>
      <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 space-y-3">
        <h3 id="about-short" class="text-slate-800 font-bold text-sm whitespace-pre-wrap"></h3>
        <p id="about-full" class="text-slate-600 text-xs leading-relaxed whitespace-pre-wrap"></p>
      </div>
    </section>

  </main>

  <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-2xl z-40">
    <div class="max-w-md mx-auto flex justify-around items-center h-16">
      <button id="nav-trends" onclick="showScreen('trends')" class="flex flex-col items-center justify-center w-full h-full text-amber-500 font-bold transition">
        <i class="material-icons">analytics</i>
        <span class="text-[10px] mt-0.5">My Trends</span>
      </button>
      <button id="nav-charts" onclick="showScreen('charts')" class="flex flex-col items-center justify-center w-full h-full text-slate-400 font-semibold transition">
        <i class="material-icons">insert_chart</i>
        <span class="text-[10px] mt-0.5">Charts</span>
      </button>
      <button id="nav-rankings" onclick="showScreen('rankings')" class="flex flex-col items-center justify-center w-full h-full text-slate-400 font-semibold transition">
        <i class="material-icons">format_list_numbered</i>
        <span class="text-[10px] mt-0.5">Rankings</span>
      </button>
    </div>
  </footer>

  <script>
    let devId = null;
    let isExistingMode = true;
    let cachedProfile = null;
    let activeDirectory = [];
    let runtimeRouting = null;

    let userSetupGuideCached = "";
    let memberRequestGuideCached = "";
    let runnerIdNoteCached = "";

    window.addEventListener('DOMContentLoaded', () => {
      resolveDeviceFingerprint();
      initializeApplicationData();
    });

    function resolveDeviceFingerprint() {
      devId = localStorage.getItem('chart5k_uuid');
      if (!devId) {
        devId = 'DEV-' + Math.random().toString(36).substring(2, 11).toUpperCase();
        localStorage.setItem('chart5k_uuid', devId);
      }
    }

    function initializeApplicationData() {
      google.script.run
        .withSuccessHandler((response) => {
          if (response.error) { alert("Initialization Failure: " + response.error); return; }
          
          document.getElementById('about-short').innerText = response.aboutShort;
          document.getElementById('about-full').innerText = response.aboutFull;
          
          // Cache spreadsheet header notes parameters locally
          userSetupGuideCached = response.userSetupGuide;
          memberRequestGuideCached = response.memberRequestGuide;
          runnerIdNoteCached = response.runnerIdNote;
          
          document.getElementById('info-user-setup').innerText = userSetupGuideCached;
          document.getElementById('info-runner-id-note').innerText = runnerIdNoteCached;
          document.getElementById('info-member-request').innerText = memberRequestGuideCached;
          
          activeDirectory = response.activeGroups;
          cachedProfile = response.deviceProfile;

          const selectGroup = document.getElementById('setup-group');
          selectGroup.innerHTML = '';
          activeDirectory.forEach(g => {
            let opt = document.createElement('option');
            opt.value = g.ssId;
            opt.textContent = g.groupName;
            selectGroup.appendChild(opt);
          });

          if (!cachedProfile) {
            document.getElementById('btn-cancel-setup').classList.add('hidden');
            showScreen('setup');
            // FORCE LOOKUP: Instantly populates the Runner ID dropdown for the default group
            if (selectGroup.options.length > 0) {
              onGroupSelectionChange();
            }
          } else {
            document.getElementById('menu-setup').classList.add('hidden');
            selectGroup.value = cachedProfile.ssId;
            onGroupSelectionChange(cachedProfile.runnerId);
            fetchLiveRoutingPayload();
          }
          document.getElementById('status-badge').className = "text-xs bg-emerald-600 text-white font-semibold px-2 py-1 rounded";
          document.getElementById('status-badge').innerText = "Online";
        })
        .getAppInitializationData(devId);
    }

    function onGroupSelectionChange(presetRunnerId = null) {
      const selectedSsId = document.getElementById('setup-group').value;
      if (!selectedSsId) return;

      google.script.run
        .withSuccessHandler((runnerIdsList) => {
          const selectId = document.getElementById('setup-id');
          selectId.innerHTML = '';
          runnerIdsList.forEach(id => {
            let opt = document.createElement('option');
            opt.value = id;
            opt.textContent = id;
            if (presetRunnerId && id === presetRunnerId) opt.selected = true;
            selectId.appendChild(opt);
          });
        })
        .getRunnerIdsForGroup(selectedSsId);
    }

    function toggleSetupMode(useExisting) {
      isExistingMode = useExisting;
      
      document.getElementById('toggle-existing').className = useExisting ? "flex-1 text-center font-bold text-xs py-2 bg-amber-400 text-slate-900 rounded-lg" : "flex-1 text-center font-bold text-xs py-2 text-slate-400 rounded-lg";
      document.getElementById('toggle-custom').className = !useExisting ? "flex-1 text-center font-bold text-xs py-2 bg-amber-400 text-slate-900 rounded-lg" : "flex-1 text-center font-bold text-xs py-2 text-slate-400 rounded-lg";
      
      const groupGuide = document.getElementById('info-user-setup');
      
      if (useExisting) {
        document.getElementById('wrapper-existing-form').classList.remove('hidden');
        document.getElementById('wrapper-custom-form').classList.add('hidden');
        groupGuide.innerText = userSetupGuideCached;
      } else {
        document.getElementById('wrapper-existing-form').classList.add('hidden');
        document.getElementById('wrapper-custom-form').classList.remove('hidden');
        groupGuide.innerText = memberRequestGuideCached;
      }
    }

    function saveSetup() {
      const selectGroup = document.getElementById('setup-group');
      if (selectGroup.selectedIndex === -1) { alert("Please select a valid group configuration."); return; }
      
      const groupName = selectGroup.options[selectGroup.selectedIndex].text;
      const ssId = selectGroup.value;

      // BRANCH A: NEW MEMBER PROCESSING (BLANK RECORD SAVE + SYSTEM MAILTO EVENT)
      if (!isExistingMode) {
        document.getElementById('status-badge').innerText = "Registering...";
        
        google.script.run
          .withSuccessHandler(() => {
            const targetGroupObject = activeDirectory.find(g => g.ssId === ssId) || activeDirectory[0];
            const ownerEmail = targetGroupObject.ownerEmail;
            
            const subject = encodeURIComponent(`CHArT5k: New Member Connection Request for ${groupName}`);
            const emailBody = `Hi Admin,\n\nI am requesting registration access to join a group node.\n\nTarget Group Name: ${groupName}\nTarget SS ID: ${ssId}\nDevice tracking tag: ${devId}\n\nPlease add my profile details to the master ledger at your earliest convenience.\n\nBest regards,\nRunner (${devId})`;
            
            window.open(`mailto:${ownerEmail}?subject=${subject}&body=${encodeURIComponent(emailBody)}`, '_self');
            
            cachedProfile = { groupName: groupName, ssId: ssId, runnerId: "" };
            document.getElementById('menu-setup').classList.add('hidden');
            showScreen('trends');
            document.getElementById('status-badge').innerText = "Approval Pending";
          })
          .saveDeviceProfile(devId, groupName, ssId, "", "BLANK_NEW_MEMBER_MODE");
        return;
      }

      // BRANCH B: EXISTING MEMBER PROCESSING (COMPLETE ROW VALUE LOGGING)
      const runnerId = document.getElementById('setup-id').value;
      if (!ssId || !runnerId) { alert("Selection parameter verification failed."); return; }

      document.getElementById('status-badge').innerText = "Mapping Profile...";
      google.script.run
        .withSuccessHandler(() => {
          cachedProfile = { groupName: groupName, ssId: ssId, runnerId: runnerId };
          document.getElementById('menu-setup').classList.add('hidden');
          fetchLiveRoutingPayload();
          showScreen('trends');
          document.getElementById('status-badge').innerText = "Online";
        })
        .saveDeviceProfile(devId, groupName, ssId, runnerId, "AUTO_LOOKUP_GID");
    }

    function fetchLiveRoutingPayload() {
      if (!cachedProfile || !cachedProfile.runnerId) return;
      google.script.run
        .withSuccessHandler((routing) => {
          runtimeRouting = routing;
          const btnTrends = document.getElementById('btn-trends');
          if (!routing.trendsUrl) {
            btnTrends.className = "w-full bg-slate-200 text-slate-400 font-bold py-3 px-4 rounded-xl flex items-center justify-center space-x-2 cursor-not-allowed";
            btnTrends.onclick = () => alert("Trends Sheet Link is unpopulated. Awaiting automated update sweep data.");
          } else {
            btnTrends.className = "w-full bg-amber-400 hover:bg-amber-500 active:scale-[0.98] transition font-bold py-3 px-4 rounded-xl text-slate-900 shadow flex items-center justify-center space-x-2";
            btnTrends.onclick = () => openLink('trendsUrl');
          }
          renderCategorizedGroupCharts(routing.charts);
        })
        .getDashboardRouting(cachedProfile.ssId, cachedProfile.runnerId);
    }

    function renderCategorizedGroupCharts(charts) {
      const wrapper = document.getElementById('charts-wrapper');
      wrapper.innerHTML = '';
      const categories = {};
      charts.forEach(c => {
        if (!categories[c.grouping]) categories[c.grouping] = [];
        categories[c.grouping].push(c);
      });

      for (let categoryName in categories) {
        let catDiv = document.createElement('div');
        catDiv.className = "bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-3";
        catDiv.innerHTML = `<h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider border-b pb-1 border-slate-50">${categoryName}</h3>`;
        let grid = document.createElement('div');
        grid.className = "grid grid-cols-2 gap-3";

        categories[categoryName].forEach(chart => {
          let btn = document.createElement('button');
          if (chart.showLink) {
            btn.className = "bg-amber-50 border border-amber-200 p-3 rounded-xl flex flex-col items-center justify-center space-y-2 active:scale-95 transition text-slate-800";
            btn.onclick = () => window.open(chart.url, '_blank');
          } else {
            btn.className = "bg-slate-50 border border-slate-100 p-3 rounded-xl flex flex-col items-center justify-center space-y-2 opacity-50 cursor-not-allowed text-slate-400";
            btn.onclick = () => alert("Your configuration metrics signature lacks viewing access for this profile category card.");
          }
          btn.innerHTML = `<i class="material-icons text-2xl ${chart.showLink ? 'text-amber-500' : 'text-slate-300'}">insert_chart</i><span class="text-[11px] font-bold text-center leading-tight">${chart.name}</span>`;
          grid.appendChild(btn);
        });
        catDiv.appendChild(grid);
        wrapper.appendChild(catDiv);
      }
    }

    function cancelSetup() { showScreen('trends'); }

    function showScreen(screenId) {
      document.querySelectorAll('.app-screen').forEach(s => s.classList.add('hidden'));
      const activeSection = document.getElementById(`screen-${screenId}`);
      if(activeSection) activeSection.classList.remove('hidden');

      ['trends', 'charts', 'rankings'].forEach(b => {
        const btn = document.getElementById(`nav-${b}`);
        if (!btn) return;
        btn.className = b === screenId ? "flex flex-col items-center justify-center w-full h-full text-amber-500 font-bold transition" : "flex flex-col items-center justify-center w-full h-full text-slate-400 font-semibold transition";
      });
    }

    function toggleMenu(open) {
      const overlay = document.getElementById('sidebar-overlay');
      const bar = document.getElementById('sidebar');
      if (open) {
        overlay.classList.remove('hidden');
        setTimeout(() => overlay.classList.add('opacity-100'), 10);
        bar.classList.remove('-translate-x-full');
      } else {
        overlay.classList.remove('opacity-100');
        bar.classList.add('-translate-x-full');
        setTimeout(() => overlay.classList.add('hidden'), 300);
      }
    }

    function openLink(objectPath) {
      if (!runtimeRouting) return;
      const url = objectPath.split('.').reduce((o, i) => o[i], runtimeRouting);
      if (url) window.open(url, '_blank');
    }
  </script>
</body>
</html>
