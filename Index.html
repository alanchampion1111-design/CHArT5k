<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 4.5rem); }
  </style>
</head>
<body class="bg-amber-50 text-slate-800 font-sans min-h-screen flex flex-col select-none">

  <header class="bg-amber-400 shadow-md p-4 sticky top-0 z-50 flex justify-between items-center">
    <div class="flex items-center space-x-3">
      <button onclick="toggleMenu(true)" class="p-1 rounded-full active:bg-amber-500 transition">
        <i class="material-icons text-2xl text-slate-900">menu</i>
      </button>
      <h1 class="text-xl font-bold tracking-wide text-slate-990">CHArT5k</h1>
    </div>
    <div id="status-badge" class="text-xs bg-amber-600 text-white font-semibold px-2 py-1 rounded">Syncing...</div>
  </header>

  <div id="sidebar-overlay" onclick="toggleMenu(false)" class="fixed inset-0 bg-black/40 z-50 hidden opacity-0 transition-opacity duration-300"></div>
  <div id="sidebar" class="fixed top-0 bottom-0 left-0 w-72 bg-white z-50 shadow-2xl transform -translate-x-full transition-transform duration-300 flex flex-col">
    <div class="p-5 bg-amber-400 font-bold text-lg text-slate-950 flex justify-between items-center">
      <span>Menu Options</span>
      <button onclick="toggleMenu(false)"><i class="material-icons">close</i></button>
    </div>

    <nav class="flex-1 p-3 space-y-1">
      <!-- 'User Profile Setting'; initial default shown;
          hidden after once-only user profile set -->
      <button id="menu-setup" onclick="showScreen('setup'); toggleMenu(false);" class="w-full flex items-center space-x-4 p-3 rounded-lg hover:bg-slate-100 text-left text-slate-700 font-medium">
        <i class="material-icons text-amber-500">person_add_alt</i> <span>User Profile Setting</span>
      </button>
      <button id="menu-group-request" onclick="triggerNewGroupRequest(); toggleMenu(false);" class="w-full flex items-center space-x-4 p-3 rounded-lg hover:bg-slate-100 text-left text-slate-700 font-medium">
        <i class="material-icons text-amber-600">group_add</i> <span>New Group request...</span>
      </button>
      <hr class="my-2 border-slate-200">
      <button onclick="showScreen('about'); toggleMenu(false);" class="w-full flex items-center space-x-4 p-3 rounded-lg hover:bg-slate-100 text-left text-slate-700 font-medium">
        <i class="material-icons text-slate-500">info</i> <span>About CHArT5k</span>
      </button>
    </nav>
    <div class="p-4 border-t border-slate-100 text-xs text-slate-400 text-center">CHArT5k Core Engine v1.2</div>
  </div>

  <main class="flex-1 p-4 safe-bottom max-w-md mx-auto w-full">
    
    <!-- My Trends screen: unreachable until after user profile fully set (Group + Runner Id) -->
    <section id="screen-trends" class="app-screen space-y-4 hidden">
      <h2 id='trends-runner-title' class="text-lg font-bold text-slate-700">My Trends</h2>
      <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 space-y-4">
        <button id="btn-trends-overall" onclick="openLink('trends.overallUrl')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl flex items-center justify-between border border-slate-100 active:bg-slate-100 transition">
          <span class="font-medium text-sm text-slate-700">Progress Chart</span><i class="material-icons text-amber-500">trending_up</i>
        </button>
        <!-- Expect recent (past year?) to be hidden if only one chart found for this runner -->
        <button id="btn-trends-recent" onclick="openLink('trends.recentUrl')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl flex items-center justify-between border border-slate-100 active:bg-slate-100 transition">
          <span class="font-medium text-sm text-slate-700">Current Trend</span><i class="material-icons text-amber-500">trending_up</i>
        </button>
        <button id="btn-trends-results" onclick="openLink('trends.resultsUrl')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl flex items-center justify-between border border-slate-100 active:bg-slate-100 transition">
          <span class="font-medium text-sm text-slate-700">Recent Results</span><i class="material-icons text-amber-500">table_chart</i>
        </button>
      </div>
      <!-- 'Request pending' appears after user sends to owner, then fully disappears after actioned
          - applies universally across all 3 screens -->
      <div class="access-status-drawer mt-6 pt-4 border-t border-slate-200 text-center">
        <button onclick="triggerAccessRequest();" class="inline-flex items-center space-x-2 text-sm text-slate-500 hover:text-amber-600 font-medium p-2 rounded transition">
          <i class="material-icons text-base">vpn_key</i>
          <span>Allow me access...</span>
        </button>
      </div>
    </section>

    <!-- <Group> Charts screen: unreachable until after user profile set (Group SS at least) -->
    <section id="screen-charts" class="app-screen space-y-4 hidden">
      <h2 id='charts-group-title' class="text-lg font-bold text-slate-700">Performance Charts</h2>
      <div id="charts-wrapper" class="space-y-4"></div>
      <!-- 'Request pending' appears after user sends to owner, then fully disappears after actioned
          - applies universally across all 3 screens -->
      <div class="access-status-drawer mt-6 pt-4 border-t border-slate-200 text-center">
        <button onclick="triggerAccessRequest();" class="inline-flex items-center space-x-2 text-sm text-slate-500 hover:text-amber-600 font-medium p-2 rounded transition">
          <i class="material-icons text-base">vpn_key</i>
          <span>Allow me access...</span>
        </button>
      </div>
    </section>

    <!-- 'Members Rankings' screen: unreachable until after user profile set (Group SS at least) -->
    <section id="screen-rankings" class="app-screen space-y-4 hidden">
      <h2 class="text-lg font-bold text-slate-700">Members Rankings</h2>
      <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-2">
        <button onclick="openLink('rankings.latestUrl')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl flex items-center justify-between border border-slate-100 active:bg-slate-100 transition">
          <span class="font-medium text-sm text-slate-700">Latest  Results</span><i class="material-icons text-amber-500">table_chart</i>
        </button>
        <button onclick="openLink('rankings.currentUrl')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl flex items-center justify-between border border-slate-100 active:bg-slate-100 transition">
          <span class="font-medium text-sm text-slate-700">Current Ranking</span><i class="material-icons text-amber-500">emoji_events</i>
        </button>
        <button onclick="openLink('rankings.bestEverUrl')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl flex items-center justify-between border border-slate-100 active:bg-slate-100 transition">
          <span class="font-medium text-sm text-slate-700">Best-Ever Ranking</span><i class="material-icons text-amber-500">stars</i>
        </button>
        <button onclick="openLink('rankings.challengeUrl')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl flex items-center justify-between border border-slate-100 active:bg-slate-100 transition">
          <span class="font-medium text-sm text-slate-700">Latest Challenge</span><i class="material-icons text-amber-500">table_chart</i>
        </button>
      </div>
      <!-- 'Request pending' appears after user sends to owner, then fully disappears after actioned
          - applies universally across all 3 screens -->
      <div class="access-status-drawer mt-6 pt-4 border-t border-slate-200 text-center">
        <button onclick="triggerAccessRequest();" class="inline-flex items-center space-x-2 text-sm text-slate-500 hover:text-amber-600 font-medium p-2 rounded transition">
          <i class="material-icons text-base">vpn_key</i>
          <span>Allow me access...</span>
        </button>
      </div>
    </section>

    <!-- 'User Profile Setting' screen: default, unreachable AFTER user profile set (Group SS at least) -->
    <section id="screen-setup" class="app-screen space-y-4 hidden">
      <h2 class="text-lg font-bold text-slate-700">User Profile Setting</h2>
      <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 space-y-4">
        <div class="flex border-b border-slate-100 pb-2 mb-2">
          <button id="toggle-existing" onclick="toggleSetupMode(true)" class="flex-1 text-center font-bold text-xs py-2 bg-amber-400 text-slate-900 rounded-lg">Existing member</button>
          <button id="toggle-custom" onclick="toggleSetupMode(false)" class="flex-1 text-center font-bold text-xs py-2 text-slate-400 rounded-lg">New member...</button>
        </div>
        <div class="space-y-2">
          <div id="info-user-setup" class="text-xs text-slate-500 bg-slate-50 p-3 rounded-xl border border-slate-200 leading-relaxed italic"></div>
          <div>
            <label class="block text-xs font-bold text-slate-500 tracking-wider mb-1">Select Group</label>
            <select id="setup-group" onchange="onGroupSelectionChange()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-amber-400 text-sm"></select>
          </div>
        </div>
        <div id="wrapper-existing-form" class="space-y-4 pt-2">
          <div class="space-y-2">
            <div id="info-runner-id-note" class="text-xs text-slate-500 bg-slate-50 p-3 rounded-xl border border-slate-200 leading-relaxed italic"></div>
            <div>
              <label class="block text-xs font-bold text-slate-500 tracking-wider mb-1">Select Runner ID</label>
              <select id="setup-id" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-amber-400 text-sm"></select>
            </div>
          </div>
        </div>
        <div id="wrapper-custom-form" class="space-y-4 hidden pt-2">
          <div id="info-member-request" class="text-xs text-blue-700 bg-blue-50/50 p-3 rounded-xl border border-blue-100 leading-relaxed italic"></div>
        </div>
        <div class="flex space-x-3 pt-2">
          <button id="btn-cancel-setup" onclick="cancelSetup()" class="flex-1 bg-slate-100 hover:bg-slate-200 py-3 rounded-xl font-semibold text-slate-600 transition">Cancel</button>
          <button onclick="saveSetup()" class="flex-1 bg-amber-400 hover:bg-amber-500 py-3 rounded-xl font-bold text-slate-900 transition shadow">Apply Setting (on this device)</button>
        </div>
      </div>
    </section>

    <!-- Presented from menu option, 'About CHarT5k' -->
    <section id="screen-about" class="app-screen space-y-4 hidden">
      <h2 class="text-lg font-bold text-slate-700">About CHArT5k</h2>
      <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 space-y-3">
        <h3 id="about-short" class="text-slate-800 font-bold text-sm whitespace-pre-wrap"></h3>
        <p id="about-full" class="text-slate-600 text-xs leading-relaxed whitespace-pre-wrap"></p>
      </div>
    </section>

  </main>

  <!-- Footer hides all three button until AFTER user profile set;
      if Runner Id not set, left button remains hidden -->
  <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-2xl z-40">
    <div class="max-w-md mx-auto flex justify-around items-center h-16">
      <button id="nav-trends" onclick="showScreen('trends')"
          class="flex flex-col items-center justify-center w-full h-full text-amber-500 font-bold transition hidden">
        <i class="material-icons">analytics</i>
        <div class="flex flex-col items-center leading-none mt-0.5">
          <span id='nav-trends-runner' class="text-[10px]">My</span>
          <span class="text-[10px] mt-0.5">Trends</span>
        </div>
      </button>
      <button id="nav-charts" onclick="showScreen('charts')"
          class="flex flex-col items-center justify-center w-full h-full text-slate-400 font-semibold transition hidden">
        <i class="material-icons">insert_chart</i>
        <div class="flex flex-col items-center leading-none mt-0.5">
          <span id="nav-charts-prefix" class="text-[10px] font-medium tracking-wide text-slate-400 block max-w-[65px] truncate text-center leading-none mb-0.5"></span>
          <span class="text-[10px] mt-0.5">Charts</span>
        </div>
      </button>
      <button id="nav-rankings" onclick="showScreen('rankings')"
          class="flex flex-col items-center justify-center w-full h-full text-slate-400 font-semibold transition hidden">
        <i class="material-icons">format_list_numbered</i>
        <div class="flex flex-col items-center leading-none mt-0.5">
          <span class="text-[10px]">Members</span>
          <span class="text-[10px] mt-0.5">Rankings</span>
        </div>
      </button>
    </div>
  </footer>

  <script>
    let devId = null;
    let isExistingMode = true;
    let cachedProfile = null;
    let activeDirectory = [];
    let runtimeRouting = null;
    let userSetupGuideCached = "";
    let memberRequestGuideCached = "";
    let runnerIdNoteCached = "";
    const openTAB = 'GroupSSTab';   // via openLink function
    const fastTAB = 'SharedSSTab';  // for window.open
    const mailTAB = 'RequestTab';   // for mailto:

/*

[ FRONT-END / Index.html ]                                  [ BACK-END / AppCode.gs ]
==========================                                  =========================
  DOMContentLoaded
         │
         ▼
 1. resolveDeviceFingerprint() 
         │
         ▼
 2. initializeApplicationData() [FE]
         │
   (Calls backend via script runner)
         │
         └──────────── google.script.run ─────────────────┐
                                                        ▼
                                                  3. doGet() ──► Renders base HTML
                                                        │
                                                        ▼
                                                  4. initializeApplicationData(devId) [BE]
                                                        ├── 1A: Scan Device Registry
                                                        ├── 1B: Verify cachedProfile
                                                        ├── 1C: Pull Active Directory Matrix
                                                        └── 1D: Calc Access State Matrix
                                                        │
         ┌──────────── Async Response Return ─────────────┘
         ▼
 5. Evaluate UI Pivot Point
         │
         ├───[ IF Profile Empty / Incomplete ]──► 6A. showScreen('setup')
         │                                               │
         │                                               ▼
         │                                            toggleSetupMode(useExisting)
         │                                               ├── Existing -> getRunnerIdsForGroup()
         │                                               └── New Member -> triggerNewGroupRequest()
         │
         └───[ IF Profile Set & Verified ]──────► 6B. fetchLiveRoutingPayload()
                                                         │
                                                         ▼
                                                      getDashboardRouting [BE]
                                                         │ (Returns target URLs)
                                                         ▼
                                                      updateNavigationContext()
                                                         └── Unhide & highlight footer tabs

The presence of initializeApplicationData on both sides represents a Client-Server Handshake Pattern. They share a name because they represent the same phase of the application life cycle, but their inner responsibilities are entirely complementary:

Attribute   Front-End                           Back-End
            initializeApplicationData()         initializeApplicationData(devId)

Location  ``Browser JavaScript context          Google Servers
            (<script> block)                    (AppCode.gs)

Role  	    The Conductor:                      The Source of Truth:
            Sets up local UI,                   Validates the devId, 
            kicks off network requests,         queries the spreadsheets, 
            handles loading screens,            builds the payload object, 
            and waits for answers.              and assesses security.

Data Scope  Interacts with localStorage         Interacts directly with 
            and toggles Tailwind utility        Google Sheets API 
            styles (like .hidden).              and reads user registries.

*/
    function openLinkOrig(objectPath) {
      if (!runtimeRouting) return;
      const url = objectPath.split('.').reduce((o, i) => o[i], runtimeRouting);
      if (url) window.open(url, 'sharedSSTab');
    }
    function openLink(objectPath) {
      if (!runtimeRouting) {
        console.warn("Route not mapped for: ",objectPath);
        return;
      }
      const url = objectPath.split('.').reduce((o, i) => o
        ? o[i]
        : undefined,
        runtimeRouting);
      if (url) window.open(url,openTAB);
      else console.warn("Click failed for: ",objectPath);
    }

    function resolveDeviceFingerprint() {
      devId = localStorage.getItem('chart5k_uuid');
      if (!devId) {
        devId = 'dev-' + self.crypto.randomUUID();
        localStorage.setItem('chart5k_uuid', devId);
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      resolveDeviceFingerprint();
      initializeApplicationData();
    });

    function initializeApplicationData() {
      // Update the layout status container signaling active synchronization channels
      document.getElementById('status-badge').innerText = "Syncing...";
      google.script.run
        .withSuccessHandler((response) => {
          if (response.error) { 
            alert("Initialization Failure: " + response.error); 
            document.getElementById('status-badge').innerText = "Error";
            return; 
          }
          console.log("=== initializeApplicationData ===");
          console.log("CachedProfile (On Arrival):",
            JSON.parse(JSON.stringify(cachedProfile)));

          // 1. Unpack and cache the header notes and fallback preambles from the server
          userSetupGuideCached = response.userSetupGuideCached || "";
          memberRequestGuideCached = response.memberRequestGuideCached || "";
          runnerIdNoteCached = response.runnerIdNoteCached || "";
          activeDirectory = response.activeDirectory || [];
          
          // 2. Populate the Master Group Selector Pull-down list
          const selectGroup = document.getElementById('setup-group');
          if (selectGroup) {
            selectGroup.innerHTML = '';
            activeDirectory.forEach(g => {
              let opt = document.createElement('option');
              opt.value = g.ssId;
              opt.textContent = g.groupName;
              selectGroup.appendChild(opt);
            });
          }
          
          // 3. Populate your precise About page elements natively
          if (response.aboutShort) {
            document.getElementById('about-short').innerText = response.aboutShort;
          }
          if (response.aboutLong) {
            document.getElementById('about-full').innerText = response.aboutLong;
          }
          
          // 4. Verify identity matching tracking vectors to clear layout viewports
          if (response.cachedProfile) {
            // Known Device: Unhide cancellation option, load profile values, route straight to Dashboard
            cachedProfile = response.cachedProfile; // global inside the sandbox
            window.myCache = cachedProfile; // truly global from F12 Console
            updateNavigationContext();
            const menuSetup = document.getElementById('menu-setup');
            if (menuSetup) menuSetup.classList.add('hidden');
            const initialStatus = cachedProfile.accessStatus || "Needed";
            syncAccessInterfaceState(initialStatus);
            document.getElementById('btn-cancel-setup').classList.remove('hidden');
            if (selectGroup) selectGroup.value = cachedProfile.ssId;
            onGroupSelectionChange(cachedProfile.runnerId);
            fetchLiveRoutingPayload();
            showScreen('trends'); 
            document.getElementById('status-badge').innerText = "Online";
          } else {
            // Unknown Device: Lock down cancel button, present default user profile setups
            cachedProfile = null;
            updateNavigationContext();
            const menuSetup = document.getElementById('menu-setup');
            if (menuSetup) menuSetup.classList.remove('hidden');
            syncAccessInterfaceState("Needed");
            document.getElementById('btn-cancel-setup').classList.add('hidden');
            document.getElementById('info-user-setup').innerText = userSetupGuideCached;
            document.getElementById('info-runner-id-note').innerText = runnerIdNoteCached;
            // Populate the secondary runner selections for the initially selected pull-down option
            if (selectGroup && selectGroup.value) {
              onGroupSelectionChange();
            }
            showScreen('setup');  // Force route user straight to Profile Setup screen
            document.getElementById('status-badge').innerText = "Setup Required";
          }
          console.log("=== initializeApplicationData ===");
          console.log("CachedProfile (On completion):",
            JSON.parse(JSON.stringify(cachedProfile)));
        })
        .initializeApplicationData(devId);
    }

    function onGroupSelectionChange(presetRunnerId = null) {
      const selectedSsId = document.getElementById('setup-group').value;
      if (!selectedSsId) return;
      google.script.run
        .withSuccessHandler((runnerIdsList) => {
          const selectId = document.getElementById('setup-id');
          selectId.innerHTML = '';
          runnerIdsList.forEach(id => {
            let opt = document.createElement('option');
            opt.value = id;
            opt.textContent = id;
            if (presetRunnerId && id === presetRunnerId) opt.selected = true;
            selectId.appendChild(opt);
          });
        })
        .getRunnerIdsForGroup(selectedSsId);
    }
    
    function toggleSetupMode(useExisting) {
      isExistingMode = useExisting;
      
      // 1. Instantly swap navigation tab styles
      document.getElementById('toggle-existing').className = useExisting
        ? "flex-1 text-center font-bold text-xs py-2 bg-amber-400 text-slate-900 rounded-lg"
        : "flex-1 text-center font-bold text-xs py-2 text-slate-400 rounded-lg";
      document.getElementById('toggle-custom').className = !useExisting
        ? "flex-1 text-center font-bold text-xs py-2 bg-amber-400 text-slate-900 rounded-lg"
        : "flex-1 text-center font-bold text-xs py-2 text-slate-400 rounded-lg";
      const groupGuide = document.getElementById('info-user-setup');
      const secondaryPreamble = document.getElementById('info-runner-id-note');
      const selectGroup = document.getElementById('setup-group');
      
      // 2. Execute a single, flat routing sequence with zero nested side-effects
      if (useExisting) {
        // Show existing form, hide custom request form
        document.getElementById('wrapper-existing-form').classList.remove('hidden');
        document.getElementById('wrapper-custom-form').classList.add('hidden');
        // Assign the primary and secondary text notes cached from the server
        groupGuide.innerText = userSetupGuideCached;
        if (secondaryPreamble) {
          secondaryPreamble.innerText = runnerIdNoteCached;
        }
        // Re-verify the runner ID subset values list for the selected group
        if (selectGroup && selectGroup.value) {
          onGroupSelectionChange(); 
        }
      } else {
        // Hide existing form, show custom request form
        document.getElementById('wrapper-existing-form').classList.add('hidden');
        document.getElementById('wrapper-custom-form').classList.remove('hidden');
        // NO difference expected in the new member preamble - hence unchanged
        // groupGuide.innerText = memberRequestGuideCached;
        if (secondaryPreamble) {
          secondaryPreamble.innerText = "Please contact the Group Owner directly to add you as a member.";
        }
        const customFormInfo = document.getElementById('info-member-request');
        if (customFormInfo) {
          customFormInfo.innerText = "After applying this Group setting, an email message will appear. "+
            " Please complete the details required and allow the Group Owner a few days "+
            " to add you as a member with your results before confirming your Runner Id has been set.";
        }
      }
    }

    /**
     * Helper: Resolves the target owner email from activeDirectory.
     * Falls back to the template owner (Row 0) if no group is selected or found.
     */
    function getOwnerEmail(thisSsId) {
      const targetGroupObject = activeDirectory.find(g =>
        g.ssId === thisSsId) || activeDirectory[0]
      return targetGroupObject
        ? targetGroupObject.ownerEmail
        : "";
    }

    function saveSetup() {
      const groupSelect = document.getElementById('setup-group');
      const ssId = groupSelect ? groupSelect.value : "";
      const groupName = groupSelect
        ? groupSelect.options[groupSelect.selectedIndex].text
        : "";
      if (!isExistingMode) {
        document.getElementById('status-badge').innerText = "Requesting...";
        google.script.run
          .withSuccessHandler(() => {
            const ownerEmail = getOwnerEmail(ssId);
            const subject = encodeURIComponent("CHArT5k: New Member  request within ("+groupName+")");
            const emailBody = "Hello,\n\n"+
              "I can confirm that I am a member of "+groupName+" that is listed on CHArT5k. "+
              " My parkrun barcode is A??????? and my date of birth (for verification) is DD-MMM-YYYY.\n\n"+
              "Please add me as a member (including my results) to this Group "+
              " and grant me direct access to view my family/club charts and members rankings within this Group.\n\n"+
              "Thanks, <full name>\n\n(from device, "+devId+")";
            window.open("mailto:"+ownerEmail+"?subject="+subject+
              "&body="+encodeURIComponent(emailBody), mailTAB);
            cachedProfile = {groupName:groupName,ssId:ssId,runnerId: "" };
            updateNavigationContext();
            document.getElementById('menu-setup').classList.add('hidden');
            showScreen('trends');
            document.getElementById('status-badge').innerText = "New member pending";
          })
          .saveDeviceProfile(devId, groupName, ssId, "", "BLANK_NEW_MEMBER_MODE");
        return;
      }
      const runnerId = document.getElementById('setup-id').value;
      if (!ssId || !runnerId) {
        alert("Selection parameter verification failed.");
        return;
      }
      const applyBtn = document.querySelector("button[onclick='saveSetup()']");
      if (applyBtn) applyBtn.disabled = true;
      document.getElementById('status-badge').innerText = "Setting Profile...";
      google.script.run
        .withSuccessHandler((payload) => {  // explicit response variable
          if (!payload || payload.error) {
            alert("Configuration sync failed: " +
              (payload ? payload.error : "Empty server response"));
            document.getElementById('status-badge').innerText = "Error";
            return;
          }
          activeDirectory = payload.activeDirectory || [];  // aligned to local state
          cachedProfile = {
            groupName: groupName,
            ssId: ssId,
            runnerId: runnerId,
            resultsGid: payload.resultsGid !== undefined ? payload.resultsGid : "",
            numRuns: payload.numRuns !== undefined ? payload.numRuns : 0,
            accessStatus: payload.accessStatus || "Requested"    // e.g. Granted if already 
          };
          updateNavigationContext();
          const menuSetupBtn = document.getElementById('menu-setup');
          if (menuSetupBtn) menuSetupBtn.classList.add('hidden');
          fetchLiveRoutingPayload();
          showScreen('trends');
          document.getElementById('status-badge').innerText = "Online";
          console.log("=== saveSetUp ===");
          console.log("CachedProfile (after Existing Member):",
            JSON.parse(JSON.stringify(cachedProfile)));
        })
        .saveDeviceProfile(devId, groupName, ssId, runnerId, "AUTO_LOOKUP_GID");
    }

    /**
     * Trigger: Generates an access request email to the Group Owner
     * specifically placed within the Members Rankings page context.
     */
    function triggerAccessRequest() {
      const groupSelect = document.getElementById('setup-group');
      const currentSsId = groupSelect ? groupSelect.value : "";
      // Safely extract the readable Group Name string option text
      const groupName = groupSelect && groupSelect.selectedIndex !== -1 
        ? groupSelect.options[groupSelect.selectedIndex].text 
        : "<Group Name>";
      const activeRunner = (typeof runnerId !== 'undefined' && runnerId) 
        ? runnerId 
        : (cachedProfile ? cachedProfile.runnerId : "<Runner Id>");
      const targetEmail = getOwnerEmail(currentSsId);
      const subjectText = "CHArT5k: Allow me access to my Group (" + groupName + ")";
      const emailBody = "Hello,\n\n" +
        "I am using the CHArT5k App as "+activeRunner+" within "+groupName+". "+
        " My parkrun barcode is A??????? and my date of birth (for verification) is DD-MMM-YYYY.\n\n"+
        "Please allow me access to view Group charts and members rankings.\n\n"+
        "In addition, please allow me edit access so that I may add non-parkrun times to my results sheet, "+
        "as well as being able to hide selective results that might otherwise distort my trends "+
        "(such as when accompanying a slower runner or during recovery from injury).\n\n"+
        "Thanks, <full name>\n\n";
      const mailtoUrl = "mailto:" + targetEmail + 
        "?subject=" + encodeURIComponent(subjectText) + 
        "&body=" + encodeURIComponent(emailBody);
      window.open(mailtoUrl,mailTAB);
    }

    function triggerNewGroupRequest() {
      // 1. Get  Group owner or App owner (from template)
      const currentSsId = document.getElementById('setup-group')
        ? document.getElementById('setup-group').value
        : "";
      const targetEmail = getOwnerEmail(currentSsId);
      // 2. Construct multi-line concatenated Body String matching your exact style
      const emailBody = "Hello,\n\n" +
        "I am a member of <club or family Group name> that may not yet be listed as a Group within CHArT5k." +
        "  I can confirm that my parkrun barcode is A??????? and my date of birth is DD-MMM-YYYY." +
        "  This group already* exists OR does not* yet exist on the parkrun site." +
        "  (* - Modify as appropriate with parkrun Group number if it exists or known.)\n\n" +
        "Please accept me as the first member of this new Group and grant me direct access" +
        " to add other members for comparison within the CHArT5k App.\n\n" +
        "Thanks, <full name>\n\n";
      const subjectText = "CHArT5k: New Group request (<new club or family Group name>*)";
      // 3. Encode and pass execution to the native hardware mail client
      const mailtoUrl = "mailto:" + targetEmail + 
        "?subject=" + encodeURIComponent(subjectText) + 
        "&body=" + encodeURIComponent(emailBody);             
      window.open(mailtoUrl, mailTAB);
    }

    /**
     * Dynamically names and toggles navigation elements based on user profile state.
     */
    function updateNavigationContext() {
      // Safely check if a profile is currently active/cached
      const hasProfile = (typeof cachedProfile !== 'undefined' && cachedProfile);
      const ssId = hasProfile ? cachedProfile.ssId : "";
      const groupName = hasProfile ? cachedProfile.groupName : "";
      const runnerId = hasProfile ? cachedProfile.runnerId : "";
    
      // 1. My Trends (appears if both Group SS and Runner Id known)
      const btnTrends = document.getElementById('nav-btn-trends');
      if (ssId && runnerId) {
        const labelTrends = document.getElementById('nav-label-trends');
         if (labelTrends) {
          if (btnTrends) btnTrends.classList.remove('hidden');
          labelTrends.innerText = "My Trends ("+runnerId+")";
        }
      } else { // Runner Id unknown or pending: Hide button
        if (btnTrends) btnTrends.classList.add('hidden');
      }
    
      // 2. <Group Name> Charts (appears when Group SS known at least)
      const btnCharts = document.getElementById('nav-btn-charts');
      if (ssId && groupName) {
        const labelCharts = document.getElementById('nav-label-charts');
        if (labelCharts) {
          if (btnCharts) btnCharts.classList.remove('hidden');
          labelCharts.innerText = groupName + " Charts";
        }
      } else {  // No Group set: Hide button
        if (btnCharts) btnCharts.classList.add('hidden');
      }
    
      // 3. Members Rankings (appears when Group SS known at least)
      const btnRankings = document.getElementById('nav-btn-rankings');
      if (ssId && groupName) {
        const labelRankings = document.getElementById('nav-label-rankings');
        if (btnRankings) btnRankings.classList.remove('hidden');
      } else {  // No Group set: Hide button
        if (btnRankings) btnRankings.classList.add('hidden');
      }
    }
    
function renderDivisionalGroupsCharts(charts) {
      if (!charts) return;
      const wrapper = document.getElementById('charts-wrapper');
      wrapper.innerHTML = '';
      const categories = {};
      charts.forEach(c => {
        if (!categories[c.grouping]) categories[c.grouping] = [];
        categories[c.grouping].push(c);
      });
      let masterCard = document.createElement('div');  // onetable with four sub-headings (at most)
      masterCard.className = "bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-4";
      let hasAnyContent = false;
      for (let categoryName in categories) {
        let validCharts = categories[categoryName].filter(chart => chart.showLink);
        if (validCharts.length > 0) {
          hasAnyContent = true;
          let header = document.createElement('h3');
          header.className = "text-xs font-bold text-slate-400 tracking-wider border-b pb-1 border-slate-50 mt-2 first:mt-0";
          header.innerHTML = categoryName;
          masterCard.appendChild(header);
          let listContainer = document.createElement('div');
          listContainer.className = "flex flex-col space-y-2 pb-2";
          validCharts.forEach(chart => {    // for each divisional category
            let btn = document.createElement('button');
            btn.className = "bg-amber-50 border border-amber-200 p-3 rounded-xl flex flex-col items-center "+
              "justify-center space-y-2 active:scale-95 transition text-slate-800";
            btn.onclick = () => window.open(chart.url, fastTAB);
            btn.innerHTML = `<i class="material-icons text-2xl text-amber-500">insert_chart</i>
              <span class="text-[11px] font-bold text-center leading-tight">${chart.name}</span>`;
            listContainer.appendChild(btn);
          });
          masterCard.appendChild(listContainer);
        }
      }
      if (hasAnyContent) {
        wrapper.appendChild(masterCard);
      }
    }

    function fetchLiveRoutingPayload() {
      if (!cachedProfile || !cachedProfile.runnerId) return;
      google.script.run
        .withSuccessHandler((routing) => {
          console.log("=== fetchLiveRoutingPayload ===");
          console.log("CachedProfile (On Arrival):",
            JSON.parse(JSON.stringify(cachedProfile)));
          console.log("--- SERVER ROUTING PAYLOAD ---");
          console.log("Full Object:", routing);
          console.log("Trends sub-object keys:", routing
            ? Object.keys(routing.trends)
            : "No trends found");
          console.log("Charts sub-object keys:", routing 
            ? Object.keys(routing.charts)
            : "No charts found");
          console.log("Rankings sub-object keys:", routing 
            ? Object.keys(routing.rankings)
            : "No rankings found");
          runtimeRouting = routing;
          
          // 0. Hide User Profile Setting after initial default setting
          const screenProfile = document.getElementById('screen-profile-settings');
          if (screenProfile) {
            screenProfile.classList.add('hidden');
          }
          const screenCharts = document.getElementById('screen-charts');
          if (screenCharts) {
            screenCharts.classList.remove('hidden');
          }

          // 1. My Trends (left button) => n/a unless user profile fully set
          if (routing && routing.trends) {
            const btnProgress = document.getElementById('btn-trends-overall');
            if (btnProgress)
              btnProgress.onclick = () => window
                .open(routing.trends.overallUrl,fastTAB);
            const btnCurrent = document.getElementById('btn-trends-recent');
            if (btnCurrent)
              btnCurrent.onclick = () => window
                .open(routing.trends.recentUrl,fastTAB);
            const btnResults = document.getElementById('btn-trends-results');
            if (btnResults)
              btnResults.onclick = () => window
                .open(routing.trends.resultsUrl,fastTAB);
          }

          // 2. Performance Charts (middle button) + dynamic Group prefix 
          const chartsNavBtn = document.getElementById('btn-nav-charts');
          if (chartsNavBtn && cachedProfile.groupName) {
            chartsNavBtn.innerHTML = `
              <span class="block text-[10px] text-slate-400 tracking-wider">${cachedProfile.groupName}</span>
              <span class="text-sm font-bold">Charts</span>
            `;
          }
          if (routing && routing.charts) {
            renderDivisionalGroupsCharts(routing.charts);
          }

          // 3. Members Rankings (right button) + Allow me access... 
          if (routing && routing.rankings) {
            const btnLatest = document.getElementById('btn-rankings-latest');
            if (btnLatest)
              btnLatest.onclick = () => window
                .open(routing.rankings.latestUrl, fastTAB);
            const btnCurrent = document.getElementById('btn-rankings-current');
            if (btnCurrent)
              btnCurrent.onclick = () => window
                .open(routing.rankings.currentUrl,fastTAB);
            const btnBest = document.getElementById('btn-rankings-best');
            if (btnBest)
              btnBest.onclick = () => window
                .open(routing.rankings.bestEverUrl,fastTAB);
            const btnChallenge = document.getElementById('btn-rankings-challenge');
            if (btnChallenge)
              btnChallenge.onclick = () => window
                .open(routing.rankings.challengeUrl,fastTAB);
          }
        })
        .getDashboardRouting(cachedProfile.ssId, cachedProfile.runnerId);
    }

    function cancelSetup() { showScreen('trends'); }

    /**
     * Synchronizes the visual state of the application interface 
     * based on the global Access Matrix status string.
     * @param {string} accessStatus - "Needed", "Requested", or "Granted"
     */
    function syncAccessInterfaceState(accessStatus) {
      const currentStatus = accessStatus || "Needed";
      
      // 1. Target all instances of the common screen wrappers simultaneously
      const statusDrawers = document.querySelectorAll('access-status-drawer');
      const accessBtn = document.getElementById('access-request-btn');
      // const menuSetup = document.getElementById('menu-setup');

      // 2. Execute the Tri-State Drawer & Button Rules Mapping
      switch (currentStatus) {
        case "Needed":  // show key for user to request access (by email)
          statusDrawers.forEach(drawer => drawer.classList.remove('hidden'));
          if (accessBtn) {
            accessBtn.disabled = false;
            accessBtn.innerText = "Allow me access...";
          }
          break;
        case "Requested": // inactive key, pending Group owner action + pull
          statusDrawers.forEach(drawer => drawer.classList.remove('hidden'));
          if (accessBtn) {  
            accessBtn.disabled = true;
            accessBtn.innerText = "Access pending...";
          }
          break;
        case "Granted": // Hide the key completely and simultaneously!
          statusDrawers.forEach(drawer => drawer.classList.add('hidden'));
          // if (menuSetup) menuSetup.classList.add('hidden'); // already hidden?
          break;         
        default:
          console.warn("Unknown Access State encountered: " + currentStatus);
      }
    }
    
    function showScreen(screenId) {
      document.querySelectorAll('.app-screen').forEach(s => s.classList.add('hidden'));
      const activeSection = document.getElementById(`screen-${screenId}`);
      if(activeSection) activeSection.classList.remove('hidden');

      ['trends', 'charts', 'rankings'].forEach(b => {
        const btn = document.getElementById(`nav-${b}`);
        if (!btn) return;
        btn.className = b === screenId ? "flex flex-col items-center justify-center w-full h-full text-amber-500 font-bold transition" : "flex flex-col items-center justify-center w-full h-full text-slate-400 font-semibold transition";
      });
    }

    function routing(screenId) {    // synonomous as if routing global
      showScreen(screenId);
    }

    function toggleMenu(open) {
      const overlay = document.getElementById('sidebar-overlay');
      const bar = document.getElementById('sidebar');
      if (open) {
        overlay.classList.remove('hidden');
        setTimeout(() => overlay.classList.add('opacity-100'), 10);
        bar.classList.remove('-translate-x-full');
      } else {
        overlay.classList.remove('opacity-100');
        bar.classList.add('-translate-x-full');
        setTimeout(() => overlay.classList.add('hidden'), 300);
      }
    }

  </script>
