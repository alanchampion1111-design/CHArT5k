options:
  logging: CLOUD_LOGGING_ONLY
steps:
  # 1. Build the Docker image with a dynamic Commit SHA tag + a latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/parkrun-champions/cloud-run-source-deploy/browser-automation-service:%%SHORT_SHA%%'
      - '-t'
      - 'europe-west1-docker.pkg.dev/parkrun-champions/cloud-run-source-deploy/browser-automation-service:latest'
      - '.'

  # 2. Deploy to Cloud Run using the explicit, unique Commit SHA image
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'browser-automation-service'
      - '--image=europe-west1-docker.pkg.dev/parkrun-champions/cloud-run-source-deploy/browser-automation-service:%%SHORT_SHA%%'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--region=europe-west1'
      - '--set-env-vars=:NODE_ENV=production'
      - '--memory=2Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=1'
images:
  - 'europe-west1-docker.pkg.dev/parkrun-champions/cloud-run-source-deploy/browser-automation-service:%%SHORT_SHA%%'
  - 'europe-west1-docker.pkg.dev/parkrun-champions/cloud-run-source-deploy/browser-automation-service:latest'
