<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      html, body { 
        margin: 0; 
        padding: 0; 
        width: 100%; 
        height: 100%; 
        overflow: hidden; 
        background-color: #fca311; /* Matches your yellow theme if it flashes */
      }
      
      iframe { 
        width: 100%; 
        /* Make it taller than the screen to compensate for the top crop */
        height: calc(100% + 50px); 
        border: none; 
        /* Pull the top of the frame up by the exact height of the Google banner */
        margin-top: -50px; 
      }
    </style>
  </head>
  <body>
    <iframe src="https://script.google.com/macros/s/AKfycbzGA2ARs2d8ON4xfIOKTMY5WFqE5oyNz5XLhEB_LeIzqj3mKNJdj2P84upsypi6hf96/exec"></iframe>
  </body>
</html>
